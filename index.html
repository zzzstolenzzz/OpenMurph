<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenMurph</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0a0a0f; color:#e8e8ef; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; overflow:hidden; }
  #wrap { position:fixed; inset:0; }
  video,canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  video { z-index:1; } canvas { z-index:2; }

  /* per-exercise counters, always visible */
  #counter { position:fixed; top:0; left:0; right:0; z-index:3; padding:calc(14px + env(safe-area-inset-top)) 16px 0; text-align:center; pointer-events:none; }
  #counts { display:flex; justify-content:center; gap:10px; }
  .cnt { position:relative; display:flex; flex-direction:column; align-items:center; padding:8px 16px; border-radius:16px; background:rgba(20,20,30,0.55); border:1px solid rgba(255,255,255,0.1); transition:transform .15s,background .15s,border-color .15s; }
  .cnt.active { background:rgba(91,108,255,0.22); border-color:#5b6cff; transform:scale(1.08); }
  .cntNum { font-size:38px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; text-shadow:0 4px 20px rgba(0,0,0,0.6); transition:transform .12s; pointer-events:auto; cursor:pointer; }
  .cnt.active .cntNum { font-size:54px; }
  .cntNum.pop { transform:scale(1.25); }
  .cntLabel { font-size:10px; font-weight:700; color:#9aa0b5; text-transform:uppercase; letter-spacing:1.5px; margin-top:2px; }
  .cnt.active .cntLabel { color:#c9cee0; }
  .plusOne { position:absolute; top:-4px; right:0; font-size:16px; font-weight:800; color:#36d399; opacity:0; }
  .plusOne.fly { animation:flyUp .8s ease-out forwards; }
  @keyframes flyUp { 0%{opacity:1; transform:translateY(0) scale(1);} 100%{opacity:0; transform:translateY(-28px) scale(1.35);} }
  .cnt.minus { background:rgba(255,77,77,0.4); border-color:#ff4d4d; transition:background .1s,border-color .1s; }
  #phase { font-size:13px; color:#9aa0b5; margin-top:8px; min-height:16px; }
  #debug { display:none; margin:10px auto 0; max-width:92vw; background:rgba(8,8,14,0.82); border-radius:18px; padding:10px 20px 14px; }
  #debug.on { display:inline-block; }
  .dbgTitle { font-size:11px; font-weight:800; letter-spacing:2px; color:#9aa0b5; }
  #dbgNum { font-size:56px; font-weight:800; color:#fff; line-height:1.05; font-variant-numeric:tabular-nums; }
  #dbgSub { font-size:12px; color:#c9cee0; margin-top:4px; font-variant-numeric:tabular-nums; }

  /* depth bar */
  #depthWrap { position:fixed; right:16px; top:50%; transform:translateY(-50%); z-index:3; width:10px; height:200px; background:rgba(255,255,255,0.08); border-radius:6px; overflow:hidden; }
  #depthFill { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top,#36d399,#5b6cff); height:0%; transition:height .08s; }
  #depthMark { position:absolute; left:-3px; right:-3px; height:2px; background:#ff6b6b; bottom:50%; }

  /* bottom controls */
  #ctrls { position:fixed; left:0; right:0; bottom:0; z-index:3; padding:14px 14px calc(14px + env(safe-area-inset-bottom)); background:linear-gradient(to top,rgba(8,8,14,0.94) 40%,transparent); }
  #exRow { display:flex; gap:8px; margin-bottom:12px; }
  .exBtn { flex:1; padding:12px 6px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:#c9cee0; font-size:13px; font-weight:700; text-align:center; }
  .exBtn.active { background:#5b6cff; color:#fff; border-color:#5b6cff; }
  #btnRow { display:flex; gap:10px; }
  .act { flex:1; padding:14px; border-radius:14px; border:none; font-size:15px; font-weight:700; }
  #reset { background:rgba(255,255,255,0.08); color:#e8e8ef; }
  #flip { background:rgba(255,255,255,0.08); color:#e8e8ef; max-width:90px; }

  #top { position:fixed; top:0; left:0; z-index:4; padding:calc(12px + env(safe-area-inset-top)) 14px; }
  #status { display:flex; align-items:center; gap:7px; font-size:12px; color:#9aa0b5; background:rgba(8,8,14,0.5); padding:6px 10px; border-radius:999px; }
  #pulse { width:8px; height:8px; border-radius:50%; background:#444; }
  #pulse.live { background:#36d399; box-shadow:0 0 8px #36d399; }

  #menuWrap { position:fixed; top:0; right:0; z-index:5; padding:calc(12px + env(safe-area-inset-top)) 14px; }
  #menuBtn { width:34px; height:34px; border-radius:50%; border:none; background:rgba(8,8,14,0.5); color:#e8e8ef; font-size:16px; line-height:1; }

  #dbgRow, #wfRow { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:0 4px; margin-bottom:12px; }
  #counts.wf-hidden { display:none; }
  .dbgLabel { font-size:13px; font-weight:700; color:#c9cee0; }
  .switch { position:relative; display:inline-block; width:44px; height:26px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .switch .slider { position:absolute; inset:0; background:rgba(255,255,255,0.15); border-radius:999px; transition:.2s; cursor:pointer; }
  .switch .slider:before { content:""; position:absolute; height:20px; width:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .slider { background:#5b6cff; }
  .switch input:checked + .slider:before { transform:translateX(18px); }

  #start {
    position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 28px; text-align:center;
    background:
      linear-gradient(rgba(8,8,13,0.55), rgba(8,8,13,0.88)),
      url('img/murph-bg.png') center top/100% auto no-repeat,
      #0a0a0f;
  }
  #startBadge { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:32px; background:linear-gradient(160deg,rgba(91,108,255,0.28),rgba(54,211,153,0.14)); border:1px solid rgba(255,255,255,0.12); box-shadow:0 0 40px rgba(91,108,255,0.35); }
  #startBadge svg { width:32px; height:32px; }
  #go { background:linear-gradient(135deg,#6f7dff,#4a59e0); color:#fff; border:none; padding:16px 46px; border-radius:999px; font-size:16px; font-weight:700; box-shadow:0 10px 30px rgba(91,108,255,0.4); transition:transform .12s,box-shadow .12s; }
  #go:active { transform:scale(.96); box-shadow:0 4px 16px rgba(91,108,255,0.3); }
  #err { color:#ff6b6b; font-size:13px; margin-top:16px; max-width:300px; }
  .hidden { display:none !important; }

  #countdown { position:fixed; inset:0; z-index:6; display:flex; align-items:center; justify-content:center; font-size:140px; font-weight:800; color:#fff; background:rgba(0,0,0,0.35); text-shadow:0 4px 30px rgba(0,0,0,0.6); pointer-events:none; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div id="start">
    <div id="startBadge">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="5" r="2.3" stroke="#9fa8ff" stroke-width="1.6"/>
        <path d="M12 7.6v6M8 11h8M9.2 20l2.8-6.4 2.8 6.4" stroke="#9fa8ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <button id="go">Begin OpenMurph</button>
    <div id="err"></div>
  </div>

  <div id="wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="top" class="hidden" data-hud><div id="status"><span id="pulse"></span><span id="statusText">starting…</span></div></div>
  <div id="menuWrap" class="hidden" data-hud><button id="menuBtn" aria-label="Exercise menu">☰</button></div>
  <div id="countdown" class="hidden">10</div>

  <div id="counter" class="hidden" data-hud>
    <div id="counts">
      <div class="cnt" id="chip-squat"><div class="cntNum" id="cnt-squat">0</div><div class="cntLabel">Squat</div></div>
      <div class="cnt" id="chip-pullup"><div class="cntNum" id="cnt-pullup">0</div><div class="cntLabel">Pull-up</div></div>
      <div class="cnt" id="chip-pushup"><div class="cntNum" id="cnt-pushup">0</div><div class="cntLabel">Push-up</div></div>
    </div>
    <div id="phase">get in frame</div>
    <div id="debug">
      <div class="dbgTitle">DEPTH</div>
      <div id="dbgNum">0%</div>
      <div id="dbgSub">—</div>
    </div>
  </div>

  <div id="depthWrap" class="hidden" data-hud><div id="depthMark"></div><div id="depthFill"></div></div>

  <div id="ctrls" class="hidden" data-hud>
    <div id="menuPanel" class="hidden">
      <div id="exRow">
        <div class="exBtn" data-ex="squat">Squat</div>
        <div class="exBtn" data-ex="pullup">Pull-up</div>
        <div class="exBtn" data-ex="pushup">Push-up</div>
        <div class="exBtn active" data-ex="auto">Auto</div>
      </div>
      <div id="dbgRow">
        <span class="dbgLabel">Debug numbers</span>
        <label class="switch"><input type="checkbox" id="dbgToggle"><span class="slider"></span></label>
      </div>
      <div id="wfRow">
        <span class="dbgLabel">Wireframe only</span>
        <label class="switch"><input type="checkbox" id="wfToggle"><span class="slider"></span></label>
      </div>
    </div>
    <div id="btnRow">
      <button class="act" id="reset">Reset</button>
      <button class="act" id="flip">Flip</button>
    </div>
  </div>

<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const $ = id => document.getElementById(id);
const video=$('video'), canvas=$('canvas'), ctx=canvas.getContext('2d');
const phaseEl=$('phase');
const cntEl={squat:$('cnt-squat'),pullup:$('cnt-pullup'),pushup:$('cnt-pushup')};
const debugEl=$('debug'), dbgNumEl=$('dbgNum'), dbgSubEl=$('dbgSub');
const chipEl={squat:$('chip-squat'),pullup:$('chip-pullup'),pushup:$('chip-pushup')};
const depthFill=$('depthFill'), depthMark=$('depthMark');
const statusText=$('statusText'), pulse=$('pulse'), errEl=$('err');

let landmarker, draw, facing='user', stream, running=false, lastT=-1, countdownActive=false;
let mode='auto';                  // squat | pullup | pushup | auto
const counts={squat:0,pullup:0,pushup:0};
let smoothDepth=null, downSince=0, curActive=null;
let rangeMin=null, rangeMax=null;   // auto-calibrated envelope of the depth signal, per exercise
let debugMode=false;
let wireframeMode=false, skeletonHidden=false, wfHideTimeout=null;
let autoCandidate=null, autoCandidateCount=0, autoActive='squat';

const L={ nose:0,lShoulder:11,rShoulder:12,lElbow:13,rElbow:14,lWrist:15,rWrist:16,
          lHip:23,rHip:24,lKnee:25,rKnee:26,lAnkle:27,rAnkle:28 };

// draws the live per-joint angle labels relevant to the active exercise (debug mode only)
function drawLabels(lm,pts){
  ctx.font='bold 13px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  for(const {idx,text} of pts){
    const p=lm[idx];
    if(!p||(p.visibility??1)<0.4) continue;
    const x=p.x*canvas.width, y=p.y*canvas.height-16;
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(-1,1); // counter the canvas's CSS mirror so text reads correctly
    const w=ctx.measureText(text).width+10;
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(-w/2,-10,w,18);
    ctx.fillStyle='#5b6cff';
    ctx.fillText(text,0,0);
    ctx.restore();
  }
}

// draws the skeleton color-coded by tracking confidence: green = tracked, red = not
function drawSkeletonDebug(lm){
  const ok=p=>(p.visibility??1)>0.4;
  ctx.lineWidth=4;
  for(const c of PoseLandmarker.POSE_CONNECTIONS){
    const a=lm[c.start], b=lm[c.end];
    if(!a||!b) continue;
    ctx.strokeStyle=(ok(a)&&ok(b))?'#36d399':'#ff4d4d';
    ctx.beginPath();
    ctx.moveTo(a.x*canvas.width,a.y*canvas.height);
    ctx.lineTo(b.x*canvas.width,b.y*canvas.height);
    ctx.stroke();
  }
  for(const p of lm){
    ctx.fillStyle=ok(p)?'#36d399':'#ff4d4d';
    ctx.beginPath();
    ctx.arc(p.x*canvas.width,p.y*canvas.height,4,0,Math.PI*2);
    ctx.fill();
  }
}

// ---------- angle helpers ----------
const angle=(a,b,c)=>{ // angle at b, 3D-aware so it works on world landmarks
  const ab={x:a.x-b.x,y:a.y-b.y,z:(a.z??0)-(b.z??0)}, cb={x:c.x-b.x,y:c.y-b.y,z:(c.z??0)-(b.z??0)};
  const dot=ab.x*cb.x+ab.y*cb.y+ab.z*cb.z;
  const m=Math.hypot(ab.x,ab.y,ab.z)*Math.hypot(cb.x,cb.y,cb.z)||1e-6;
  return Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI;
};
const avg=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2,visibility:Math.min(a.visibility??1,b.visibility??1)});
const vis=(lm,i)=>(lm[i].visibility??1)>0.4;
const allVis=(lm,idxs)=>idxs.every(i=>vis(lm,i));

const JOINT_NAME={
  [L.nose]:'face',
  [L.lShoulder]:'shoulders',[L.rShoulder]:'shoulders',
  [L.lElbow]:'elbows',[L.rElbow]:'elbows',
  [L.lWrist]:'wrists',[L.rWrist]:'wrists',
  [L.lHip]:'hips',[L.rHip]:'hips',
  [L.lKnee]:'knees',[L.rKnee]:'knees',
  [L.lAnkle]:'ankles',[L.rAnkle]:'ankles',
};
function frameHint(names){
  const lower=names.some(n=>['knees','ankles','hips'].includes(n));
  const upper=names.some(n=>['shoulders','elbows','wrists'].includes(n));
  if(lower&&upper) return 'step back — your whole body needs to be in frame';
  if(lower) return 'step back so your legs are visible';
  if(upper) return 'step back so your arms are visible';
  return 'move into frame';
}

// ---------- per-exercise config ----------
// each: measure() -> {value (0..100 depth %), down(bool flag thresholds), label, detail}
const EX = {
  squat:{
    label:'Squats', mark:50,
    needVis:[L.lHip,L.rHip,L.lKnee,L.rKnee,L.lAnkle,L.rAnkle],
    measure(lm,wl){
      const kneeAng=(angle(wl[L.lHip],wl[L.lKnee],wl[L.lAnkle])+angle(wl[L.rHip],wl[L.rKnee],wl[L.rAnkle]))/2;
      // 170 = standing straight, ~70 = deep squat
      const depth=clamp((175-kneeAng)/(175-75)*100,0,100);
      return {depth, kneeAng};
    },
    downAt:55, upAt:35,            // depth % thresholds (hysteresis)
    detail(m){ return m.kneeAng<100?'good depth':'go lower'; },
    debugPoints(lm,wl){
      const lA=angle(wl[L.lHip],wl[L.lKnee],wl[L.lAnkle]), rA=angle(wl[L.rHip],wl[L.rKnee],wl[L.rAnkle]);
      return [{idx:L.lKnee,text:`L knee ${lA.toFixed(0)}°`},{idx:L.rKnee,text:`R knee ${rA.toFixed(0)}°`}];
    }
  },
  pushup:{
    label:'Push-ups', mark:50,
    needVis:[L.lShoulder,L.rShoulder,L.lElbow,L.rElbow,L.lWrist,L.rWrist],
    measure(lm,wl){
      const elbow=(angle(wl[L.lShoulder],wl[L.lElbow],wl[L.lWrist])+angle(wl[L.rShoulder],wl[L.rElbow],wl[L.rWrist]))/2;
      const depth=clamp((170-elbow)/(170-80)*100,0,100); // 170 arms straight, 80 chest down
      return {depth, elbow};
    },
    downAt:55, upAt:35,
    detail(m){ return m.elbow<95?'chest down':'lower more'; },
    debugPoints(lm,wl){
      const lA=angle(wl[L.lShoulder],wl[L.lElbow],wl[L.lWrist]), rA=angle(wl[L.rShoulder],wl[L.rElbow],wl[L.rWrist]);
      return [{idx:L.lElbow,text:`L elbow ${lA.toFixed(0)}°`},{idx:L.rElbow,text:`R elbow ${rA.toFixed(0)}°`}];
    }
  },
  pullup:{
    label:'Pull-ups', mark:55,
    needVis:[L.nose,L.lShoulder,L.rShoulder,L.lElbow,L.rElbow,L.lWrist,L.rWrist],
    measure(lm,wl){
      // chin/nose rising toward wrists = up; arms straighten at bottom
      const wristY=Math.min(lm[L.lWrist].y,lm[L.rWrist].y);
      const noseY=lm[L.nose].y;
      const shoulderY=(lm[L.lShoulder].y+lm[L.rShoulder].y)/2;
      const elbow=(angle(wl[L.lShoulder],wl[L.lElbow],wl[L.lWrist])+angle(wl[L.rShoulder],wl[L.rElbow],wl[L.rWrist]))/2;
      // range from wrists(top) to a hang position ~ shoulder+span below
      const span=Math.abs(shoulderY-wristY)||0.2;
      // chin progress toward wrist line: 0 hanging, 100 chin at hands
      const depth=clamp((shoulderY-noseY+span*0.4)/(span*0.9)*100 + (170-elbow)/170*30,0,100);
      return {depth, elbow, noseY, wristY};
    },
    downAt:40, upAt:25,
    detail(m){ return m.depth>40?'chin up!':'full hang'; },
    debugPoints(lm,wl){
      const lA=angle(wl[L.lShoulder],wl[L.lElbow],wl[L.lWrist]), rA=angle(wl[L.rShoulder],wl[L.rElbow],wl[L.rWrist]);
      return [{idx:L.lElbow,text:`L elbow ${lA.toFixed(0)}°`},{idx:L.rElbow,text:`R elbow ${rA.toFixed(0)}°`}];
    }
  }
};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ---------- rep state machine ----------
let phase='up';                 // 'up' (top) or 'down' (bottom)
let lastFlip=0;
function tick(key,ex,m,autoInfo){
  const now=performance.now();
  depthFill.style.height=m.depth.toFixed(0)+'%';
  depthMark.style.bottom=ex.mark+'%';
  if(phase==='up' && m.depth>=ex.downAt){
    phase='down'; downSince=now; phaseEl.textContent=ex.detail(m);
  } else if(phase==='down' && m.depth<=ex.upAt){
    // require the bottom to hold briefly so a camera jolt can't fake a rep
    if(now-downSince>=120 && now-lastFlip>350){ counts[key]++; lastFlip=now; bump(key); }
    phase='up'; phaseEl.textContent='up';
  } else {
    phaseEl.textContent = phase==='down' ? ex.detail(m) : 'ready';
  }
  if(debugMode){
    dbgNumEl.textContent=m.depth.toFixed(0)+'%';
    let line=`${phase} · raw ${m.raw.toFixed(0)}% · range ${rangeMin.toFixed(0)}-${rangeMax.toFixed(0)} · need ≥${ex.downAt}/≤${ex.upAt}`;
    if(autoInfo) line+=` · auto(${autoInfo.signal}): wristΔ${autoInfo.wristShoulderDelta.toFixed(2)}`;
    dbgSubEl.textContent=line;
  }
}
function bump(key){
  const el=cntEl[key], chip=chipEl[key];
  el.textContent=counts[key];
  el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),130);
  const plus=document.createElement('div');
  plus.className='plusOne fly';
  plus.textContent='+1';
  chip.appendChild(plus);
  setTimeout(()=>plus.remove(),800);
  if(navigator.vibrate) navigator.vibrate(30);
}

// ---------- auto-detect exercise ----------
function detect(lm){
  const wristY=Math.min(lm[L.lWrist].y,lm[L.rWrist].y);
  const shoulderY=(lm[L.lShoulder].y+lm[L.rShoulder].y)/2;
  const shoulderX=(lm[L.lShoulder].x+lm[L.rShoulder].x)/2;
  const noseY=lm[L.nose].y;
  const wristShoulderDelta=wristY-shoulderY; // negative = wrists above shoulders
  let result='squat', signal='head';
  // hands well above head -> pull-up
  if(wristShoulderDelta < -0.05 && vis(lm,L.lWrist) && vis(lm,L.rWrist)){
    result='pullup';
  } else if(vis(lm,L.lHip) && vis(lm,L.rHip)){
    // hips visible: most reliable signal — torso orientation (how much of
    // its length runs sideways vs up-down). Stays stable through a push-up
    // rep since you're not rotating, just moving slightly toward/away from
    // the camera, unlike an absolute shoulder-hip distance.
    signal='hips';
    const hipY=(lm[L.lHip].y+lm[L.rHip].y)/2, hipX=(lm[L.lHip].x+lm[L.rHip].x)/2;
    const dx=hipX-shoulderX, dy=hipY-shoulderY;
    if(Math.abs(dx)>Math.abs(dy)) result='pushup';
  } else if(vis(lm,L.nose)){
    // legs out of frame (common push-up camera placement) — fall back to
    // head position alone: standing/squatting keeps the head stacked above
    // the shoulders; a horizontal push-up doesn't.
    if(!(noseY < shoulderY-0.05)) result='pushup';
  }
  return {result, signal, wristShoulderDelta};
}
function detectStable(lm){
  const d=detect(lm);
  if(d.result===autoCandidate) autoCandidateCount++; else { autoCandidate=d.result; autoCandidateCount=1; }
  if(autoCandidateCount>=5) autoActive=d.result; // ~5 consistent frames before switching, avoids flicker mid-rep
  return {active:autoActive, info:d};
}

// ---------- camera + loop ----------
async function init(){
  const fs=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker=await PoseLandmarker.createFromOptions(fs,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",delegate:"GPU"},
    runningMode:"VIDEO", numPoses:1
  });
  draw=new DrawingUtils(ctx);
}
async function startCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},audio:false});
  video.srcObject=stream; await video.play();
}
function loop(){
  if(!running) return;
  if(video.readyState>=2){
    if(canvas.width!==video.videoWidth){canvas.width=video.videoWidth;canvas.height=video.videoHeight;}
    if(!countdownActive && video.currentTime!==lastT){ lastT=video.currentTime;
      const res=landmarker.detectForVideo(video,performance.now()); render(res);
    }
  }
  requestAnimationFrame(loop);
}
// shows the camera feed for `seconds` before the wireframe/counting begins, giving the user time to get into frame
function runCountdown(seconds){
  return new Promise(resolve=>{
    const el=$('countdown');
    let n=seconds;
    el.textContent=n;
    el.classList.remove('hidden');
    const iv=setInterval(()=>{
      n--;
      if(n<=0){ clearInterval(iv); el.classList.add('hidden'); resolve(); }
      else el.textContent=n;
    },1000);
  });
}
function render(res){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!res.landmarks||!res.landmarks.length){ statusText.textContent='no person — step into frame'; phaseEl.textContent='get in frame'; return; }
  statusText.textContent='live';
  const lm=res.landmarks[0];
  const wl=(res.worldLandmarks&&res.worldLandmarks[0])||lm; // camera-rotation-invariant 3D landmarks
  if(!(wireframeMode && skeletonHidden)){
    if(debugMode){
      drawSkeletonDebug(lm);
    } else {
      draw.drawConnectors(lm,PoseLandmarker.POSE_CONNECTIONS,{color:'rgba(255,255,255,0.5)',lineWidth:2});
      draw.drawLandmarks(lm,{radius:3,color:'#5b6cff'});
    }
  }

  const auto=mode==='auto'?detectStable(lm):null;
  const active=auto?auto.active:mode;
  Object.entries(chipEl).forEach(([k,el])=>el.classList.toggle('active',k===active));

  if(active!==curActive){ curActive=active; phase='up'; smoothDepth=null; downSince=0; rangeMin=null; rangeMax=null; }

  const ex=EX[active];
  if(!allVis(lm,ex.needVis)){
    const missing=[...new Set(ex.needVis.filter(i=>!vis(lm,i)).map(i=>JOINT_NAME[i]))];
    phaseEl.textContent=frameHint(missing);
    if(debugMode){ dbgNumEl.textContent='—'; dbgSubEl.textContent=`can't see: ${missing.join(', ')}`; }
    return;
  }
  if(debugMode) drawLabels(lm,ex.debugPoints(lm,wl));

  const m=ex.measure(lm,wl);
  smoothDepth = smoothDepth===null ? m.depth : smoothDepth+0.35*(m.depth-smoothDepth);
  const raw=smoothDepth;

  // calibrate against this session's own observed range — fixed angle
  // thresholds don't generalize across camera placements/body types.
  // Expand-only (no decay): a held position must never shrink the range,
  // or noise becomes the whole signal once the range collapses.
  if(rangeMin===null){ rangeMin=raw; rangeMax=raw; }
  rangeMin=Math.min(rangeMin,raw); rangeMax=Math.max(rangeMax,raw);
  const norm=clamp((raw-rangeMin)/Math.max(rangeMax-rangeMin,15)*100,0,100);

  tick(active,ex,{...m,depth:norm,raw},auto?.info);
}

// ---------- UI ----------
$('go').addEventListener('click',async()=>{
  errEl.textContent='';
  try{
    statusText.textContent='loading…';
    $('start').classList.add('hidden');
    document.querySelectorAll('[data-hud]').forEach(e=>e.classList.remove('hidden'));
    const initPromise=landmarker?Promise.resolve():init(); // load the model while the camera/countdown run
    await startCam();
    running=true; pulse.classList.add('live'); requestAnimationFrame(loop);
    statusText.textContent='get ready…';
    countdownActive=true;
    await runCountdown(10);
    await initPromise; // make sure the model's ready before detection starts
    countdownActive=false;
  }catch(e){
    $('start').classList.remove('hidden');
    errEl.textContent='Could not start: '+(e.message||e)+' — open over HTTPS and allow camera.';
  }
});
document.querySelectorAll('.exBtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.exBtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); mode=b.dataset.ex;
  phase='up'; smoothDepth=null; downSince=0; curActive=null; rangeMin=null; rangeMax=null;
  autoCandidate=null; autoCandidateCount=0;
}));
$('menuBtn').addEventListener('click',()=>{ $('menuPanel').classList.toggle('hidden'); });
$('dbgToggle').addEventListener('change',e=>{ debugMode=e.target.checked; debugEl.classList.toggle('on',debugMode); });
$('wfToggle').addEventListener('change',e=>{
  wireframeMode=e.target.checked;
  $('counts').classList.toggle('wf-hidden',wireframeMode);
});
$('wrap').addEventListener('pointerdown',()=>{
  if(!wireframeMode) return;
  skeletonHidden=true;
  clearTimeout(wfHideTimeout);
  wfHideTimeout=setTimeout(()=>{ skeletonHidden=false; },5000);
});
$('reset').addEventListener('click',()=>{
  Object.keys(counts).forEach(k=>{ counts[k]=0; cntEl[k].textContent='0'; });
  phase='up'; smoothDepth=null; downSince=0; rangeMin=null; rangeMax=null;
});
$('flip').addEventListener('click',async()=>{ facing=facing==='user'?'environment':'user'; try{await startCam();}catch(e){errEl.textContent=e.message;} });
Object.entries(cntEl).forEach(([key,el])=>el.addEventListener('click',()=>{
  if(counts[key]<=0) return;
  counts[key]--; el.textContent=counts[key];
  chipEl[key].classList.add('minus');
  setTimeout(()=>chipEl[key].classList.remove('minus'),500);
  if(navigator.vibrate) navigator.vibrate(15);
}));
</script>
